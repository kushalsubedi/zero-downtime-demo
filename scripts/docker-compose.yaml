services:
  app_blue:
    build: ..
    container_name: app_blue
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://user:password@postgres:5432/mydb"
    networks:
      app_net:
        aliases:
          - app_active


  app_green:
    build: ..
    container_name: app_green
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://user:password@postgres:5432/mydb"
    networks:
      app_net:

  
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    depends_on:
      - app_blue
      
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      app_net:

  postgres:
    image: postgres:16
    container_name: postgres
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    
    networks:
      - app_net

volumes:
  pg_data:

networks:
  app_net: